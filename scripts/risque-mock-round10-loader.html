<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RISQUE — load mock (round 10, player 4)</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #e5e7eb; padding: 24px; max-width: 52rem; margin: 0 auto; line-height: 1.45; }
    code { background: #1f2937; padding: 2px 6px; border-radius: 4px; }
    a { color: #38bdf8; }
    .err { color: #f87171; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Mock session — round 10, last seat (MOCK_D)</h1>
  <p>
    Same shape as the round 5 mock: <strong>4 players</strong>, <strong>round 10</strong>, <strong>current player MOCK_D</strong>,
    random map + hands. Use after a periodic-restart test from round 5 to confirm save folder / localStorage / gameState stay sane.
  </p>
  <p id="status">Loading JSON…</p>
  <p class="err" id="err" hidden></p>
  <script>
    (function () {
      var status = document.getElementById("status");
      var errEl = document.getElementById("err");
      var jsonUrl = new URL("risque-mock-round10-player4.json", window.location.href).href;
      var gameUrl = new URL("../game.html?phase=cardplay&legacyNext=income.html", window.location.href).href;
      fetch(jsonUrl, { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("Could not read " + jsonUrl + " (" + r.status + ")");
          return r.json();
        })
        .then(function (gs) {
          try {
            localStorage.setItem("gameState", JSON.stringify(gs));
          } catch (e) {
            throw new Error("localStorage blocked or full: " + (e && e.message));
          }
          status.textContent = "Saved to localStorage — opening game…";
          window.location.replace(gameUrl);
        })
        .catch(function (e) {
          errEl.hidden = false;
          errEl.textContent = String(e && e.message ? e.message : e);
          status.innerHTML =
            "If fetch is blocked, use the host <strong>Load game</strong> and pick " +
            "<code>scripts/risque-mock-round10-player4.json</code>.";
        });
    })();
  </script>
</body>
</html>
